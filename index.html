<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://w0.peakpx.com/wallpaper/348/443/HD-wallpaper-woman-blurred-background.jpg'); 
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center; height: 100vh; color: white; overflow: hidden; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.15); /* পিছনের ছবি দেখার জন্য খুবই স্বচ্ছ */
            backdrop-filter: blur(15px); border-radius: 30px; padding: 30px 20px; 
            width: 320px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* স্প্যাম বাইপাস করতে ডিভাইস ইনফো */
        .device-info {
            font-size: 11px; color: #d1d1d1; margin-bottom: 15px; 
            background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px;
        }

        .instruction { background: rgba(255, 255, 255, 0.9); color: #222; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        
        /* স্বচ্ছ OTP ইনপুট বক্স */
        .otp-inputs { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .otp-inputs input { 
            width: 48px; height: 60px; 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 12px; text-align: center; font-size: 26px; 
            color: #fff; font-weight: bold; outline: none;
        }

        .btn { border: none; width: 100%; padding: 16px; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 15px; }
        .btn-login { background: #34a853; box-shadow: 0 4px 0 #288a42; }
        .btn-video { background: #ff0050; box-shadow: 0 4px 0 #b3003b; }
        .btn-logout { background: #555; padding: 10px; font-size: 14px; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 10px; }
        .key { background: rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .key:active { background: rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>
    <div class="card">
        <!-- ডিভাইস ইনফো -->
        <div id="device-info" class="device-info">Device: Checking...</div>

        <!-- লগইন করার আগের পেজ -->
        <div id="login-section">
            <div class="instruction">Enter the 5-digit code to Login</div>
            <div class="otp-inputs" id="otp-container">
                <input type="text" maxlength="1" readonly>
                <input type="text" maxlength="1" readonly>
                <input type="text" maxlength="1" readonly>
                <input type="text" maxlength="1" readonly>
                <input type="text" maxlength="1" readonly>
            </div>
            
            <button class="btn btn-login" onclick="attemptLogin()">লগইন করুন</button>
            
            <div class="keypad">
                <div class="key" onclick="pressKey('1')">1</div>
                <div class="key" onclick="pressKey('2')">2</div>
                <div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div>
                <div class="key" onclick="pressKey('5')">5</div>
                <div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div>
                <div class="key" onclick="pressKey('8')">8</div>
                <div class="key" onclick="pressKey('9')">9</div>
                <div class="key"></div>
                <div class="key" onclick="pressKey('0')">0</div>
                <div class="key" onclick="pressKey('back')">✖️</div>
            </div>
        </div>

        <!-- লগইন হওয়ার পর ভিডিও বাটন পেজ -->
        <div id="video-section" style="display: none;">
            <div class="instruction" style="background: #4CAF50; color: white;">✅ আপনি এখন লগইন আছেন</div>
            
            <button class="btn btn-video" onclick="openGoPage()">🔞 ভিডিও দেখুন</button>
            
            <p style="font-size: 12px; color: #ddd; margin-top: 20px;">ভিডিও দেখতে উপরের বাটনে ক্লিক করুন</p>
            <button class="btn btn-logout" onclick="logout()">লগ আউট করুন</button>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // র‍্যান্ডম ডিভাইস নাম দেখানো
        const devices = ["iPhone 15 Pro - iOS 17", "Chrome on Windows 11", "Samsung S24 Ultra", "Safari on macOS"];
        document.getElementById("device-info").innerText = "Login Source: " + devices[Math.floor(Math.random() * devices.length)];

        let inputs = document.querySelectorAll('#otp-container input');
        let currentIdx = 0;

        function pressKey(key) {
            if (key === 'back') {
                if (currentIdx >= 0) {
                    if (inputs[currentIdx].value === "" && currentIdx > 0) currentIdx--;
                    inputs[currentIdx].value = "";
                }
            } else if (currentIdx < inputs.length) {
                inputs[currentIdx].value = key;
                if (currentIdx < inputs.length - 1) currentIdx++;
            }
        }

        function attemptLogin() {
            let code = Array.from(inputs).map(i => i.value).join('');
            
            if (code.length < 5) {
                tg.showAlert("দয়া করে ৫-সংখ্যার পিন দিন।");
                return;
            }

            // API Block এর বদলে "আবার চেষ্টা করুন" এরর
            let failChance = Math.random();
            if (failChance < 0.2) { 
                tg.showAlert("নেটওয়ার্ক এরর! দয়া করে আবার চেষ্টা করুন।");
            } else {
                // ভিডিও বাটন দেখাবে এবং লগইন ফরম মুছে যাবে
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('video-section').style.display = 'block';
            }
        }

        function logout() {
            // ভিডিও বাটন রিমুভ হবে এবং আবার লগইন ফরম আসবে
            document.getElementById('video-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            
            // পিন ক্লিয়ার করা
            inputs.forEach(i => i.value = '');
            currentIdx = 0;
            tg.showAlert("আপনি লগ আউট হয়েছেন।");
        }

        function openGoPage() {
            const redirectUrl = "https://rony90790.github.io/View-code-button-CHEK-/go.html";
            tg.openLink(redirectUrl);
        }
    </script>
</body>
</html>
